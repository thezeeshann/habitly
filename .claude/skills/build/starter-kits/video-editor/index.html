<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Video Editor - CE.SDK Solution</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: auto;
      }
      #cesdk_container {
        width: 100%;
        height: 100%;
      }
    </style>
    <!-- START_HIDDEN_BLOCK -->
    <script>
      if (
        new URLSearchParams(window.location.search).get('demoPreview') ===
        'true'
      ) {
        document.documentElement.classList.add('demo-preview');
      }
    </script>
    <style>
      html.demo-preview,
      html.demo-preview body,
      html.demo-preview #cesdk_container {
        background: transparent;
        background-color: transparent;
      }
      html.demo-preview #cesdk_container {
        width: calc(100% - 24px);
        height: calc(100% - 24px);
        margin: 12px;
        border-radius: 0.75rem;
        overflow: hidden;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow:
          0px 0px 2px rgba(22, 22, 23, 0.25),
          0px 4px 6px -2px rgba(22, 22, 23, 0.12),
          0px 2px 2.5px -2px rgba(22, 22, 23, 0.12),
          0px 1px 1.75px -2px rgba(22, 22, 23, 0.12);
      }
    </style>
    <!-- END_HIDDEN_BLOCK -->
  </head>

  <body>
    <div id="cesdk_container"></div>
    <script type="module" src="src/index.ts"></script>
  </body>
</html>
